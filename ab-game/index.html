<!doctype html>
<!-- Temporary small project: hosted under milan-trip-2026/ab-game only; do not replace the main Milan trip page. -->
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3-Digit A/B Challenge</title>
  <style>
    :root {
      --ink: #101828;
      --muted: #667085;
      --line: #d9e5f4;
      --panel: #ffffff;
      --bg: #edf5fb;
      --decathlon-navy: #002b6f;
      --decathlon-blue: #0072ce;
      --sky: #e7f2ff;
      --yellow: #ffdc3d;
      --red: #dc3e31;
      --green: #008f5a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "PingFang TC", "Microsoft JhengHei", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, var(--decathlon-navy) 0 260px, var(--bg) 260px);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(0, 114, 206, 0.10) 1px, transparent 1px),
        linear-gradient(rgba(0, 114, 206, 0.10) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    .page {
      position: relative;
      width: min(100%, 760px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 24px 18px max(32px, env(safe-area-inset-bottom));
      display: grid;
      align-content: start;
      gap: 16px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .badge {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      min-height: 32px;
      padding: 6px 10px;
      border: 1px solid rgba(255, 255, 255, 0.34);
      background: rgba(255, 255, 255, 0.12);
      color: #ffffff;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.12;
      border-radius: 4px;
    }

    .badge small {
      display: block;
      margin-top: 2px;
      font-size: 10px;
      font-weight: 700;
      opacity: 0.78;
    }

    header {
      color: #ffffff;
      padding: 4px 0 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 8vw, 58px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .title-en {
      margin-top: 6px;
      font-size: clamp(20px, 5vw, 34px);
      font-weight: 800;
      line-height: 1.1;
    }

    .subtitle {
      margin: 8px 0 0;
      color: rgba(255, 255, 255, 0.82);
      font-size: 16px;
      line-height: 1.45;
    }

    .game-panel {
      background: var(--panel);
      border: 0;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 18px 46px rgba(0, 32, 85, 0.20);
    }

    .clue-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .cell {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--line);
      font-size: clamp(28px, 8vw, 48px);
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      color: var(--decathlon-navy);
    }

    .cell:nth-child(odd) {
      border-right: 1px solid var(--line);
      background: #f8fbff;
    }

    .cell:nth-last-child(-n + 2) { border-bottom: 0; }

    .hint {
      gap: 8px;
      font-size: clamp(22px, 6vw, 38px);
    }

    .hint span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      height: 44px;
      border: 2px solid var(--decathlon-blue);
      background: var(--sky);
      color: var(--decathlon-navy);
      font-weight: 900;
      border-radius: 4px;
    }

    .answer-panel {
      display: grid;
      gap: 12px;
      background: var(--decathlon-navy);
      border-radius: 8px;
      padding: 16px;
      color: #fff;
      box-shadow: 0 16px 36px rgba(0, 32, 85, 0.22);
    }

    .answer-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    input {
      width: 100%;
      min-height: 52px;
      border: 0;
      border-radius: 6px;
      padding: 0 14px;
      font-size: 28px;
      font-weight: 900;
      text-align: center;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
      color: var(--decathlon-navy);
    }

    button {
      min-width: 118px;
      min-height: 52px;
      border: 0;
      border-radius: 6px;
      background: var(--yellow);
      color: var(--decathlon-navy);
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.65;
      cursor: default;
    }

    .message {
      min-height: 26px;
      font-size: 15px;
      line-height: 1.45;
      color: #d9e8ff;
    }

    .message.correct { color: #9ef6c2; }
    .message.error { color: #ffc5bf; }
    .message.info { color: #d9e8ff; }

    .rule-strip {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .rule {
      border-left: 6px solid var(--decathlon-blue);
      background: rgba(255, 255, 255, 0.94);
      padding: 10px 12px;
      font-size: 14px;
      line-height: 1.35;
      box-shadow: 0 8px 24px rgba(0, 32, 85, 0.08);
    }

    .rule strong { display: block; font-size: 17px; margin-bottom: 2px; }

    .rule small {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .shake { animation: shake 0.18s linear; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    @media (max-width: 520px) {
      body { background: linear-gradient(180deg, var(--decathlon-navy) 0 250px, var(--bg) 250px); }
      .page { padding: 18px 12px max(24px, env(safe-area-inset-bottom)); }
      .topbar { align-items: flex-start; }
      .answer-row { grid-template-columns: 1fr; }
      button { width: 100%; }
      .rule-strip { grid-template-columns: 1fr; }
      .cell { min-height: 64px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <div class="badge">會前暖身<small>Meeting warm-up</small></div>
      <div class="badge">5 組線索<small>5 clues</small></div>
    </div>

    <header>
      <h1>會前暖身：破解 3 位數密碼</h1>
      <div class="title-en">Crack the 3-digit code</div>
      <p class="subtitle">每位數字只用一次。Use each digit once. Five clues lead to one answer.</p>
    </header>

    <section class="game-panel" aria-label="五組提示">
      <div class="clue-grid" id="clueGrid"></div>
    </section>

    <section class="answer-panel" id="answerPanel" aria-label="答案輸入">
      <div class="answer-row">
        <input id="answerInput" inputmode="numeric" maxlength="3" autocomplete="off" placeholder="輸入 3 位數 / 3 digits">
        <button id="submitButton" type="button">驗證 / Check</button>
      </div>
      <div id="message" class="message info">輸入 3 位不重複數字。Enter 3 unique digits.</div>
    </section>

    <section class="rule-strip" aria-label="規則說明">
      <div class="rule"><strong>A</strong>數字正確，位置也正確<small>Right digit, right position</small></div>
      <div class="rule"><strong>B</strong>數字正確，但位置不同<small>Right digit, wrong position</small></div>
    </section>
  </main>

  <script>
    const CONFIG = {
      str_answer: "359",
      list_clues: [
        { str_guess: "576", str_hint: "0A 1B" },
        { str_guess: "687", str_hint: "0A 0B" },
        { str_guess: "459", str_hint: "2A 0B" },
        { str_guess: "482", str_hint: "0A 0B" },
        { str_guess: "325", str_hint: "1A 1B" }
      ]
    };

    const STATE = {
      num_attempts: 0,
      bool_solved: false
    };

    const el_clueGrid = document.getElementById("clueGrid");
    const el_answerPanel = document.getElementById("answerPanel");
    const el_answerInput = document.getElementById("answerInput");
    const el_submitButton = document.getElementById("submitButton");
    const el_message = document.getElementById("message");

    function renderClues() {
      el_clueGrid.innerHTML = CONFIG.list_clues.map((obj_clue) => {
        const [str_a, str_b] = obj_clue.str_hint.split(" ");
        return `
          <div class="cell">${obj_clue.str_guess}</div>
          <div class="cell hint"><span>${str_a}</span><span>${str_b}</span></div>
        `;
      }).join("");
    }

    function validateAnswer(str_value) {
      if (!/^[0-9]{3}$/.test(str_value)) {
        return "請輸入剛好 3 位數字。Enter exactly 3 digits.";
      }
      if (new Set(str_value).size !== 3) {
        return "數字不能重複，例如 332 不符合規則。Digits cannot repeat.";
      }
      return "";
    }

    function getHint(str_guess) {
      let num_a = 0;
      let num_b = 0;
      for (let num_index = 0; num_index < CONFIG.str_answer.length; num_index += 1) {
        if (str_guess[num_index] === CONFIG.str_answer[num_index]) {
          num_a += 1;
        } else if (CONFIG.str_answer.includes(str_guess[num_index])) {
          num_b += 1;
        }
      }
      return `${num_a}A ${num_b}B`;
    }

    function showMessage(str_type, str_text) {
      el_message.className = `message ${str_type}`;
      el_message.textContent = str_text;
    }

    function shakePanel() {
      el_answerPanel.classList.remove("shake");
      void el_answerPanel.offsetWidth;
      el_answerPanel.classList.add("shake");
    }

    function handleSubmit() {
      try {
        if (STATE.bool_solved) return;
        const str_value = el_answerInput.value.trim();
        const str_error = validateAnswer(str_value);
        if (str_error) {
          showMessage("error", str_error);
          shakePanel();
          return;
        }

        STATE.num_attempts += 1;
        if (str_value === CONFIG.str_answer) {
          STATE.bool_solved = true;
          showMessage("correct", `答對了，密碼是 ${CONFIG.str_answer}。Correct. The code is ${CONFIG.str_answer}.`);
          el_submitButton.disabled = true;
          el_answerInput.disabled = true;
          return;
        }

        showMessage("error", `還不是答案；這次結果是 ${getHint(str_value)}。Not the answer yet; this result is ${getHint(str_value)}. Attempt ${STATE.num_attempts}.`);
        shakePanel();
      } catch (error) {
        showMessage("error", "發生錯誤，請重新整理頁面。Something went wrong. Refresh the page.");
      }
    }

    function init() {
      renderClues();
      el_answerInput.addEventListener("input", () => {
        el_answerInput.value = el_answerInput.value.replace(/\D/g, "").slice(0, 3);
      });
      el_submitButton.addEventListener("click", handleSubmit);
      el_answerInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") handleSubmit();
      });
    }

    init();
  </script>
</body>
</html>
